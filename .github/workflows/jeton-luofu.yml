name: Build Jeton Luofu 22.03.6
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Checkout OpenWrt 22.03.6
      run: |
        git clone https://git.openwrt.org/openwrt/openwrt.git -b v22.03.6 openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install luci-app-wireguard luci-app-vpn-policy-routing
        echo "CONFIG_TARGET_hisilicon=y" >> .config
        echo "CONFIG_TARGET_hisilicon_luofu=y" >> .config
        make defconfig
    - name: Build
      run: |
        cd openwrt
        make -j$(nproc) V=s
    - uses: actions/upload-artifact@v4
      with:
        name: jeton-luofu-22.03.6
        path: openwrt/bin/targets/hisilicon/luofu/*.bin
