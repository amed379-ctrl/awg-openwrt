name: Build Jeton Luofu
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Build OpenWrt hisilicon/luofu
      run: |
        git clone https://git.openwrt.org/openwrt/openwrt.git -b v22.03.6
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        echo "CONFIG_TARGET_hisilicon=y" >> .config
        echo "CONFIG_TARGET_hisilicon_luofu=y" >> .config  
        make defconfig
        make -j$(nproc) V=s
    - uses: actions/upload-artifact@v4
      with:
        name: jeton-luofu-22.03.6
