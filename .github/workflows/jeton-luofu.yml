name: Build Jeton Luofu 22.03.6
on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version"
        type: string
        required: true
        default: "22.03.6"
      openwrt_arch:
        description: "OpenWrt arch"
        type: string
        required: true
        default: "arm_cortex-a9"
      openwrt_target:
        description: "OpenWrt target"
        type: string
        required: true
        default: "hisilicon"
      openwrt_subtarget:
        description: "OpenWrt subtarget"
        type: string
        required: true
        default: "luofu"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Clone OpenWrt 22.03.6
      run: |
        git clone https://git.openwrt.org/openwrt/openwrt.git -b v22.03.6
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a luci-app-wireguard luci-app-vpn-policy-routing
        
    - name: Configure for Jeton AX3000 Core
      run: |
        cd openwrt
        echo "CONFIG_TARGET_hisilicon=y" >> .config
        echo "CONFIG_TARGET_hisilicon_luofu=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-vpn-policy-routing=y" >> .config
        echo "CONFIG_PACKAGE_wireguard-tools=y" >> .config
        make defconfig
        
    - name: Build firmware
      run: |
        cd openwrt
        make -j$(nproc) V=s
        
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: jeton-ax3000-luofu-22.03.6
        path: openwrt/bin/targets/hisilicon/luofu/*.bin
